# Test fixture: Layer dependency violation

nodes:
  UIComponent:
    type: Component
    description: "UI component"
    layer: interface

  AppService:
    type: Component
    description: "Application service"
    layer: application

  DomainEntity:
    type: Component
    description: "Domain entity"
    layer: domain

  DatabaseRepo:
    type: Component
    description: "Database repository"
    layer: infrastructure

edges:
  # Valid: interface -> application
  - { from: UIComponent, to: AppService, relation: depends_on }

  # Valid: application -> domain
  - { from: AppService, to: DomainEntity, relation: depends_on }

  # Valid: domain -> infrastructure (exception for persistence)
  - { from: DomainEntity, to: DatabaseRepo, relation: depends_on }

  # INVALID: infrastructure -> application (upward dependency)
  - { from: DatabaseRepo, to: AppService, relation: depends_on }
