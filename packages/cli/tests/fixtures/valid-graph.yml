# Test fixture: Valid graph

nodes:
  Feature-A:
    type: Feature
    description: "Feature A"
    priority: core

  Feature-B:
    type: Feature
    description: "Feature B"
    priority: supporting

  ComponentA:
    type: Component
    description: "Component A implements Feature A"
    layer: application

  ComponentB:
    type: Component
    description: "Component B implements Feature B, depends on A"
    layer: application

  ComponentC:
    type: Component
    description: "Component C depends on B"
    layer: application

  SharedService:
    type: Component
    description: "Shared infrastructure service"
    layer: infrastructure

  TestA:
    type: Test
    description: "Tests for ComponentA"

edges:
  # implements
  - { from: ComponentA, to: Feature-A, relation: implements }
  - { from: ComponentB, to: Feature-B, relation: implements }

  # depends_on (forms a chain: C -> B -> A -> Shared)
  - { from: ComponentA, to: SharedService, relation: depends_on }
  - { from: ComponentB, to: ComponentA, relation: depends_on }
  - { from: ComponentB, to: SharedService, relation: depends_on }
  - { from: ComponentC, to: ComponentB, relation: depends_on }

  # tested_by
  - { from: ComponentA, to: TestA, relation: tested_by }
