# GID Graph Definition
# This file defines the dependency graph for your project.
# Learn more: https://github.com/tonioyeme/graph-indexed-development

# ═══════════════════════════════════════════════════════════════════════════════
# NODES
# ═══════════════════════════════════════════════════════════════════════════════

nodes:
  # ───────────────────────────────────────────────────────────────────────────
  # Features (What users can do)
  # ───────────────────────────────────────────────────────────────────────────

  User-Authentication:
    type: Feature
    description: "Users can register, login, and manage their account"
    priority: core

  Order-Management:
    type: Feature
    description: "Users can create and track orders"
    priority: core

  # ───────────────────────────────────────────────────────────────────────────
  # Components (How features are implemented)
  # ───────────────────────────────────────────────────────────────────────────

  UserService:
    type: Component
    description: "Handles user registration, authentication, and profile management"
    layer: application

  OrderService:
    type: Component
    description: "Handles order creation and lifecycle management"
    layer: application

  PaymentService:
    type: Component
    description: "Processes payments and refunds"
    layer: application

  DatabaseService:
    type: Component
    description: "Manages database connections and queries"
    layer: infrastructure

  # ───────────────────────────────────────────────────────────────────────────
  # Tests
  # ───────────────────────────────────────────────────────────────────────────

  UserService-Test:
    type: Test
    description: "Unit tests for UserService"

  OrderService-Test:
    type: Test
    description: "Unit tests for OrderService"

# ═══════════════════════════════════════════════════════════════════════════════
# EDGES
# ═══════════════════════════════════════════════════════════════════════════════

edges:
  # Components implement Features
  - { from: UserService, to: User-Authentication, relation: implements }
  - { from: OrderService, to: Order-Management, relation: implements }
  - { from: PaymentService, to: Order-Management, relation: implements }

  # Component dependencies
  - { from: OrderService, to: UserService, relation: depends_on }
  - { from: OrderService, to: PaymentService, relation: depends_on }
  - { from: UserService, to: DatabaseService, relation: depends_on }
  - { from: OrderService, to: DatabaseService, relation: depends_on }
  - { from: PaymentService, to: DatabaseService, relation: depends_on }

  # Test relationships
  - { from: UserService, to: UserService-Test, relation: tested_by }
  - { from: OrderService, to: OrderService-Test, relation: tested_by }
